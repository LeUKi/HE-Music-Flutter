name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  ios-release:
    name: Build iOS Artifacts
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      FLUTTER_VERSION: "stable"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 安装依赖
        run: make get

      - name: 执行 iOS 构建脚本
        run: |
          chmod +x scripts/build_ios.sh
          ./scripts/build_ios.sh

      - name: 存放 iOS 构建产物
        run: |
          mkdir -p dist/ios
          mv iphone.ipa dist/ios/

      - name: 上传 iOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: he-music-ios-release
          path: |
            dist/ios/*.ipa
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: ios-release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: 下载 iOS 构建产物
        uses: actions/download-artifact@v4
        with:
          name: he-music-ios-release
          path: artifacts/ios

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ios/**/*.ipa
